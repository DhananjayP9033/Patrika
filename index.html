<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Page Title</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shojumaru&display=swap'); /* Importing a sample traditional font */

        .image-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* Adjust the max-width as needed */
            margin: 0;
        }

        .top_img {
            width: 100%;
            height: 300px; /* Maintain image aspect ratio */
            margin: 0; /* Set margin to 0 */
            max-height: 500px; /* Adjust the max-height as needed */
        }

        .overlay-text {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px; /* Adjusted font size */
            text-align: center;
            font-family: 'Shojumaru', cursive; /* Applying the traditional font */
            font-weight: bold; /* Making the font bold */
            white-space: nowrap; /* Prevent text wrapping */
        }

        .overlay-sub-text{
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 16px; /* Adjusted font size */
            text-align: center;
            font-family: 'Shojumaru', cursive; /* Applying the traditional font */
            font-weight: bold; /* Making the font bold */
            white-space: nowrap; /* Prevent text wrapping */
        }
        .audio{
            left:50%;
            align:center;
        }
        @media only screen and (min-width: 600px) {
            /* Larger screen styles if needed */
            .overlay-text {
                font-size: 30px; /* Adjusted font size for larger screens */
            }
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="IMG_0030.png" alt="Description of the image" class="top_img">
        <div class="overlay-text">विराट & अनुष्का</div>
        <div class="overlay-sub-text"> || यांचा शुभ मंगल विवाह ||
    </div>

    <audio controls autoplay loop>
        <source src="Ullam Paadum×Virushka Wedding Clips❤(MP3_70K).mp3" type="audio/mp3">
        Your browser does not support the audio tag.
    </audio>

    <!-- Your content goes here -->

</body>
</html>
